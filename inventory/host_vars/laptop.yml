# =============================================================================
# Battery charge thresholds
# Maximizes long-term cell longevity — detected at runtime via sysfs
# =============================================================================
tlp_charge_start: 75
tlp_charge_stop: 80

# =============================================================================
# auto-cpufreq — balanced performance/battery with health focus
# =============================================================================
# Allow short turbo bursts on battery for responsiveness
auto_cpufreq_battery_turbo: auto

# =============================================================================
# Display (Hyprland)
# =============================================================================
hyprland_vfr: 1    # keep enabled — important for laptop battery life
hyprland_vrr: 0    # off — laptop display has no VRR support
