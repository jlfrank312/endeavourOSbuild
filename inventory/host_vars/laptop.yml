# =============================================================================
# Battery charge thresholds
# Maximizes long-term cell longevity — detected at runtime via sysfs
# =============================================================================
tlp_charge_start: 75
tlp_charge_stop: 80

# =============================================================================
# auto-cpufreq — balanced performance/battery with health focus
# =============================================================================
# Allow short turbo bursts on battery for responsiveness
auto_cpufreq_battery_turbo: auto

# Removed, under the presumption that letting  auto-cpufreq and the CPU's hardware P-state driver manage the floor themselves is preferable
# 400MHz minimum prevents scheduler stutter under light interactive load
# auto_cpufreq_scaling_min_freq: 400000 

# No frequency cap — let turbo headroom exist when needed
# auto_cpufreq_scaling_max_freq: not set

# =============================================================================
# Display (Hyprland)
# =============================================================================
hyprland_vfr: 1    # keep enabled — important for laptop battery life
hyprland_vrr: 0    # off — laptop display has no VRR support
