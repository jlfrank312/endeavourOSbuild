---
# --- Playbook orchestration ---
# STAGE 1. Detect hardware and execute Common role -- runs on ALL devices every time

- name: Stage 1 - Identifying hardware and assigning Common tasks
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: common

# STAGE 2. Assign roles according to hardware facts gathered in Stage 1
# gather_facts: false — facts and global_* set_fact variables from Stage 1
# are retained in memory for the duration of the playbook run.
- name: Stage 2 - Assignment of roles according to hardware facts
  hosts: all
  become: true
  gather_facts: false

  roles:
    - role: cachyos_conversion
      when:
        - global_is_x86 | default(false)
        - global_supports_x86_64_v3 | default(false)

    - role: safety

    - role: nvidia_gpu
      when:
        - global_has_nvidia_gpu | default(false)
        - not (global_is_virtual_guest | default(false))

    - role: intel_gpu
      when:
        - global_has_intel_gpu | default(false)

    - role: desktop_ii
      when:
        - (global_is_desktop | default(false) or global_is_laptop | default(false))
        - use_illogical_impulse | default(false)

    - role: ii_compat
      when:
        - (global_is_desktop | default(false) or global_is_laptop | default(false))
        - not (use_illogical_impulse | default(true))

    - role: main_pc
      when: global_is_desktop | default(false)

    - role: laptop
      when:
        - global_is_laptop | default(false)

    - role: pc_apps
      when:
        - (global_is_laptop | default(false) or global_is_desktop | default(false))

    - role: gaming
      when:
        - (global_is_desktop | default(false) or global_is_laptop | default(false))

    - role: development
      when:
        - (global_is_desktop | default(false) or global_is_laptop | default(false))

    - role: remote_access

    - role: media_server
      when:
        - global_has_nvidia_gpu | default(false)
        - global_is_desktop | default(false)

    - role: pi_services
      when:
        - global_is_arm | default(false)

    - role: autoupdate
