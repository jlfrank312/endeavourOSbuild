---
# =============================================================================
# Hardware Probing Commands
# =============================================================================
- name: Ensure pciutils is installed for accurate GPU detection
  community.general.pacman:
    name: pciutils
    state: present

- name: Probe PCI devices for GPU detection
  ansible.builtin.command: lspci
  register: common_lspci_output
  changed_when: false

- name: Probe CPU flags for x86_64-v3 support
  ansible.builtin.command: grep -E "^flags|^Features" /proc/cpuinfo
  register: common_cpuinfo_output
  changed_when: false
  failed_when: false

- name: Probe for battery charge threshold support
  ansible.builtin.stat:
    path: /sys/class/power_supply/BAT0/charge_control_end_threshold
  register: common_battery_threshold_stat

- name: Probe root filesystem type
  ansible.builtin.command: findmnt -n -o FSTYPE /
  register: common_root_fs_output
  changed_when: false
  failed_when: false

# =============================================================================
# Custom Fact Construction
# =============================================================================
# global_ variables explicitly designated for cross-role usage throughout playbook
- name: Set core architecture and form factor facts # noqa: var-naming
  ansible.builtin.set_fact:
    global_is_laptop: "{{ ansible_facts['form_factor'] in ['Notebook', 'Laptop', 'Portable', 'Sub Notebook'] }}"
    global_is_desktop: "{{ ansible_facts['form_factor'] in ['Desktop', 'Tower', 'Mini Tower', 'All In One'] }}"
    global_is_arm: "{{ ansible_facts['architecture'] in ['aarch64', 'armv7l'] }}"
    global_is_virtual_guest: "{{ (ansible_facts['virtualization_role'] | default('none')) == 'guest' }}"
    global_has_intel_cpu: "{{ 'Intel' in (ansible_facts['processor'] | join(' ')) }}"
    global_root_fstype: "{{ (common_root_fs_output.stdout | default('unknown')) | trim }}"

- name: Set derived platform facts # noqa: var-naming
  ansible.builtin.set_fact:
    global_is_x86: "{{ not global_is_arm }}"
    global_has_nvidia_gpu: >-
      {{ (common_lspci_output.stdout_lines | default([]))
         | select('search', 'NVIDIA')
         | list | length > 0 }}
    global_has_intel_gpu: >-
      {{ (common_lspci_output.stdout_lines | default([]))
         | select('search', 'VGA.*Intel|Intel.*VGA')
         | list | length > 0 }}
    global_has_amd_gpu: >-
      {{ (common_lspci_output.stdout_lines | default([]))
         | select('search', 'VGA.*(Advanced Micro Devices|AMD)|(Advanced Micro Devices|AMD).*VGA')
         | list | length > 0 }}
    global_supports_charge_threshold: "{{ common_battery_threshold_stat.stat.exists }}"

- name: Set x86_64-v3 capability fact # noqa: var-naming
  ansible.builtin.set_fact:
    global_supports_x86_64_v3: >-
      {{ global_is_x86 and
         (common_cpuinfo_output.rc | default(1) | int) == 0 and
         'avx'   in (common_cpuinfo_output.stdout | default('')) and
         'avx2'  in (common_cpuinfo_output.stdout | default('')) and
         'bmi1'  in (common_cpuinfo_output.stdout | default('')) and
         'bmi2'  in (common_cpuinfo_output.stdout | default('')) and
         'f16c'  in (common_cpuinfo_output.stdout | default('')) and
         'fma'   in (common_cpuinfo_output.stdout | default('')) and
         ('lzcnt' in (common_cpuinfo_output.stdout | default('')) or
          'abm'   in (common_cpuinfo_output.stdout | default(''))) and
         'movbe' in (common_cpuinfo_output.stdout | default('')) and
         'xsave' in (common_cpuinfo_output.stdout | default('')) }}

# =============================================================================
# Dynamic Group Assignments
# =============================================================================
- name: Assign host to 'desktops' group
  ansible.builtin.add_host:
    name: "{{ inventory_hostname }}"
    groups: desktops
  when: global_is_desktop or global_is_laptop

- name: Assign host to 'laptops' group
  ansible.builtin.add_host:
    name: "{{ inventory_hostname }}"
    groups: laptops
  when: global_is_laptop

- name: Assign host to 'pi' group
  ansible.builtin.add_host:
    name: "{{ inventory_hostname }}"
    groups: pi
  when: global_is_arm

- name: Assign host to 'nvidia_hosts' group
  ansible.builtin.add_host:
    name: "{{ inventory_hostname }}"
    groups: nvidia_hosts
  when: global_has_nvidia_gpu | default(false)
