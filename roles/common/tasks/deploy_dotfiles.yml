---
# =============================================================================
# 1. State Checks
# =============================================================================
- name: Check if host-specific dotfiles directory exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}"
  register: common_host_dotfiles_dir
  delegate_to: localhost
  become: false

# NOTE: The filetree lookup plugin returns items with state 'file', 'directory',
# or 'link'. Symlinks are intentionally omitted from these tasks to enforce
# explicit copying and templating of regular files.

# =============================================================================
# 2. Common Dotfiles
# =============================================================================
- block:
    - name: Ensure directories exist for common dotfiles
      ansible.builtin.file:
        path: "/home/{{ user_name }}/{{ item.path }}"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/common/"
      when: item.state == 'directory'

    - name: Deploy common static dotfiles
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "/home/{{ user_name }}/{{ item.path }}"
        owner: "{{ user_name }}"
        mode: '0644'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/common/"
      when:
        - item.state == 'file'
        - not item.path.endswith('.j2')

    - name: Deploy common templated dotfiles
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "/home/{{ user_name }}/{{ item.path | regex_replace('\\.j2$', '') }}"
        owner: "{{ user_name }}"
        mode: '0644'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/common/"
      when:
        - item.state == 'file'
        - item.path.endswith('.j2')

    # user.fish lives in conf.d/ and is auto-sourced by fish — no lineinfile needed.
    # kitty.conf must explicitly include user.conf; create the file if absent.
    - name: Ensure kitty config includes user.conf
      ansible.builtin.lineinfile:
        path: "/home/{{ user_name }}/.config/kitty/kitty.conf"
        line: "include user.conf"
        state: present
        create: true
        owner: "{{ user_name }}"
        mode: '0644'

  when:
    - not (use_illogical_impulse | default(false))
    - (global_is_desktop | default(false)) or (global_is_laptop | default(false))

# =============================================================================
# 3. Host-Specific Dotfiles
# =============================================================================
- block:
    - name: Ensure directories exist for host-specific dotfiles
      ansible.builtin.file:
        path: "/home/{{ user_name }}/{{ item.path }}"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/"
      when: item.state == 'directory'

    - name: Deploy host-specific static dotfiles
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "/home/{{ user_name }}/{{ item.path }}"
        owner: "{{ user_name }}"
        mode: '0644'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/"
      when:
        - item.state == 'file'
        - not item.path.endswith('.j2')

    - name: Deploy host-specific templated dotfiles
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "/home/{{ user_name }}/{{ item.path | regex_replace('\\.j2$', '') }}"
        owner: "{{ user_name }}"
        mode: '0644'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/"
      when:
        - item.state == 'file'
        - item.path.endswith('.j2')

  when:
    - not (use_illogical_impulse | default(false))
    - common_host_dotfiles_dir.stat.exists
