---
# =============================================================================
# 1. VS Code
# =============================================================================
- name: Install VS Code
  ansible.builtin.expect:
    command: yay -S visual-studio-code-bin --sudoloop --noconfirm --needed
    responses:
      '(?i)\[sudo\] password for {{ user_name }}': "{{ ansible_become_password }}"
      '(?i)password': "{{ ansible_become_password }}"
    timeout: 3600
  become: true
  become_user: "{{ user_name }}"

- name: Ensure VS Code extensions directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.vscode/extensions"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'

- name: Install VS Code extensions
  ansible.builtin.command:
    cmd: code --install-extension {{ item }} --force
  loop:
    - eamodio.gitlens
    - foxundermoon.shell-format
    - github.vscode-pull-request-github
    - ikbengeenrobot.ansible-variable-lookup
    - ms-python.python
    - ms-vscode-remote.remote-ssh
    - ms-vscode-remote.remote-ssh-edit
    - ms-vscode.remote-explorer
    - redhat.ansible
    - redhat.vscode-yaml
    - timonwong.shellcheck
    - wolfmah.ansible-vault-inline
  become_user: "{{ user_name }}"
  become: true
  changed_when: false

# =============================================================================
# 2. Development Tools
# =============================================================================
- name: Install development tools
  community.general.pacman:
    name:
      - ansible-lint
      - yamllint
      - python-pip
    state: present
