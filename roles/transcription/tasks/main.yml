---
# =============================================================================
# transcription role
#
# Installs the full local transcription stack on locus:
#   - ffmpeg          (system package — audio extraction)
#   - faster-whisper  (pip, isolated venv on alter)
#   - Whisper models  (all five sizes, pre-downloaded to alter for evaluation)
#   - transcribe      (wrapper script → ~/.local/bin/transcribe)
#
# Gate conditions (enforced in site.yml):
#   global_has_nvidia_gpu AND global_is_desktop
#
# alter dependency:
#   Venv and model tasks are gated on global_alter_mounted.
#   The script is always deployed — it will error gracefully if alter is absent.
# =============================================================================
 
# =============================================================================
# 1. System Dependencies
# =============================================================================
- name: Install system dependencies
  community.general.pacman:
    name:
      - ffmpeg
      - cuda    # required by ctranslate2 for GPU inference
    state: present
 
# =============================================================================
# 2. Venv Setup (alter-gated)
# =============================================================================
- name: Ensure whisper directory exists on alter
  ansible.builtin.file:
    path: /mnt/alter/Models/whisper
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  when: global_alter_mounted | default(false)
 
- name: Create faster-whisper virtualenv
  ansible.builtin.pip:
    name:
      - faster-whisper
    virtualenv: /mnt/alter/Models/whisper/venv
    virtualenv_command: python -m venv
    state: present
  become: true
  become_user: "{{ user_name }}"
  when: global_alter_mounted | default(false)
 
# =============================================================================
# 2b. CUDA Compatibility Workaround (alter-gated, self-healing)
#
# CachyOS ships CUDA 13 while ctranslate2 has CUDA 12 lib paths hard-coded.
# Fix: prepend /opt/cuda/targets/x86_64-linux/lib to LD_LIBRARY_PATH.
#
# Detection: try importing ctranslate2 with a clean LD_LIBRARY_PATH.
# If import fails → deploy the fish conf.d shim.
# If import succeeds → remove the shim (auto-heals once ct2 supports CUDA 13).
# The transcribe script applies the same logic at runtime via os.execv re-exec.
# =============================================================================
- name: Check if ctranslate2 imports cleanly without CUDA path override
  ansible.builtin.command:
    argv:
      - /mnt/alter/Models/whisper/venv/bin/python
      - -c
      - "import ctranslate2"
  register: transcription_ct2_native_check
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ user_name }}"
  environment:
    LD_LIBRARY_PATH: ""
  when: global_alter_mounted | default(false)

- name: Deploy fish CUDA path shim (ctranslate2 cannot find CUDA 13 libs natively)
  ansible.builtin.copy:
    dest: /etc/fish/conf.d/cuda.conf
    content: |
      # ctranslate2 CUDA compatibility shim — auto-removed once ct2 ships CUDA 13 support.
      # Deployed by the transcription role when ctranslate2 fails to import without this path.
      set -x LD_LIBRARY_PATH /opt/cuda/targets/x86_64-linux/lib $LD_LIBRARY_PATH
    owner: root
    mode: '0644'
  when:
    - global_alter_mounted | default(false)
    - transcription_ct2_native_check.rc != 0

- name: Remove fish CUDA path shim (ctranslate2 finds CUDA libraries natively)
  ansible.builtin.file:
    path: /etc/fish/conf.d/cuda.conf
    state: absent
  when:
    - global_alter_mounted | default(false)
    - transcription_ct2_native_check.rc == 0

# =============================================================================
# 3. Model Pre-download (alter-gated)
#
# All five model sizes are downloaded for evaluation.  At runtime, --model
# selects which one to load; default is large-v3.
#
# HuggingFace hub cache layout under download_root:
#   models--Systran--faster-whisper-<name>/
#
# The `creates:` argument makes each task idempotent — if the directory
# already exists the download is skipped entirely, no Python is invoked.
# =============================================================================
- name: Pre-download Whisper models
  ansible.builtin.command:
    argv:
      - /mnt/alter/Models/whisper/venv/bin/python
      - -c
      - |
        from faster_whisper import WhisperModel
        WhisperModel("{{ item }}", device="cpu",
                     download_root="/mnt/alter/Models/whisper")
    creates: "/mnt/alter/Models/whisper/models--Systran--faster-whisper-{{ item }}"
  loop:
    - tiny
    - base
    - small
    - medium
    - large-v3
  become: true
  become_user: "{{ user_name }}"
  when: global_alter_mounted | default(false)

# =============================================================================
# 4. Transcribe Script Deployment
#
# Shebang points directly at the venv interpreter — no activation needed.
# The script is self-contained and accepts:
#   transcribe <video> [--model MODEL] [--language LANG]
# =============================================================================
- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  become: false

- name: Deploy transcribe script
  ansible.builtin.copy:
    src: transcribe
    dest: "/home/{{ user_name }}/.local/bin/transcribe"
    owner: "{{ user_name }}"
    mode: '0755'
  become: false
