---
# =============================================================================
# 0. Alter Partition — Configuration & Mount Status
# =============================================================================
# global_ variables explicitly designated for cross-role usage throughout playbook
- name: Check whether alter UUID is configured # noqa: var-naming
  ansible.builtin.set_fact:
    global_alter_uuid_set: >-
      {{ (data_mounts | selectattr('name', 'equalto', 'alter')
         | list | map(attribute='uuid') | first | default('')) | length > 0 }}
  become: false

- name: Check whether alter is currently mounted
  ansible.builtin.command: mountpoint -q /mnt/alter
  register: alter_mountpoint_check
  changed_when: false
  failed_when: false
  become: false

- name: Set global_alter_mounted fact # noqa: var-naming
  ansible.builtin.set_fact:
    global_alter_mounted: "{{ alter_mountpoint_check.rc == 0 }}"
  become: false

# =============================================================================
# 1. Mount Point Creation
# =============================================================================
- name: Create data mount point directories
  ansible.builtin.file:
    path: "/mnt/{{ item.name }}"
    state: directory
    owner: root
    mode: '0755'
  loop: "{{ data_mounts }}"
  when: item.uuid | default('') | length > 0

- name: Create arturia mount point
  ansible.builtin.file:
    path: /mnt/arturia
    state: directory
    owner: root
    mode: '0755'
  when: arturia_uuid | default('') | length > 0

# =============================================================================
# 2. Systemd Mount Units
# Deployment is gated on UUIDs being populated.
# Populate vault_locus_*_uuid vars after first boot with: lsblk -f
# =============================================================================
- name: Deploy data partition mount units
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/systemd-data-mount.conf.j2"
    dest: "/etc/systemd/system/mnt-{{ mount.name }}.mount"
    owner: root
    mode: '0644'
  loop: "{{ data_mounts }}"
  loop_control:
    loop_var: mount
  when: mount.uuid | default('') | length > 0

# =============================================================================
# Arturia (Windows C) — read-only, on-demand automount
# Kept separate: AssertPathExists, ro options, and idle timeout differ
# from the standard data mounts above.
# =============================================================================
- name: Deploy arturia mount unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/mnt-arturia.mount
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Mount arturia (Windows C)
      After=local-fs.target
      AssertPathExists=/dev/disk/by-uuid/{{ arturia_uuid }}

      [Mount]
      What=/dev/disk/by-uuid/{{ arturia_uuid }}
      Where=/mnt/arturia
      Type=ntfs3
      Options=uid={{ vault_locus_user_uid }},gid={{ vault_locus_user_gid }},dmask=022,fmask=133,windows_names,ro,noatime,errors=remount-ro

      [Install]
      WantedBy=multi-user.target
  when: arturia_uuid | default('') | length > 0

- name: Deploy arturia automount unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/mnt-arturia.automount
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Automount arturia (Windows C) on demand
      After=local-fs.target
      AssertPathExists=/dev/disk/by-uuid/{{ arturia_uuid }}

      [Automount]
      Where=/mnt/arturia
      TimeoutIdleSec=300

      [Install]
      WantedBy=multi-user.target
  when: arturia_uuid | default('') | length > 0

- name: Deploy mount-arturia helper script
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.local/bin/mount-arturia"
    owner: "{{ user_name }}"
    mode: '0755'
    content: |
      #!/bin/bash
      sudo systemctl start mnt-arturia.automount
      echo "arturia mounted. Remember to run umount-arturia before booting Windows."
  become: false

- name: Deploy umount-arturia helper script
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.local/bin/umount-arturia"
    owner: "{{ user_name }}"
    mode: '0755'
    content: |
      #!/bin/bash
      sudo systemctl stop mnt-arturia.automount
      echo "arturia unmounted. Safe to boot Windows."
  become: false

# =============================================================================
# 3. Enable and Start Mount Units
# =============================================================================
- name: Enable and start data partition mount units
  ansible.builtin.systemd:
    name: "mnt-{{ item.name }}.mount"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ data_mounts }}"
  when: item.uuid | default('') | length > 0

- name: Enable and start arturia automount unit
  ansible.builtin.systemd:
    name: mnt-arturia.automount
    enabled: true
    state: started
    daemon_reload: true
  when: arturia_uuid | default('') | length > 0

# =============================================================================
# 4. alter Directory Structure
# =============================================================================
- name: Create alter directory structure
  ansible.builtin.file:
    path: "/mnt/alter/{{ item }}"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  loop:
    - Downloads
    - Documents
    - Pictures
    - Videos
    - Music
    - Books
    - Projects
    - Games
    - Models
    - Backups
    - Clutter
    - System
  when:
  - global_alter_uuid_set
  - global_alter_mounted

# =============================================================================
# 5. Home Directory Symlinks → alter
# =============================================================================
- name: Remove existing XDG home directories
  ansible.builtin.file:
    path: "/home/{{ user_name }}/{{ item }}"
    state: absent
  loop:
    - Downloads
    - Documents
    - Pictures
    - Videos
    - Music
    - Books
    - Projects
    - Games
    - Clutter
  when:
  - global_alter_uuid_set
  - global_alter_mounted

- name: Create home directory symlinks to alter
  ansible.builtin.file:
    src: "/mnt/alter/{{ item }}"
    dest: "/home/{{ user_name }}/{{ item }}"
    state: link
    owner: "{{ user_name }}"
  loop:
    - Downloads
    - Documents
    - Pictures
    - Videos
    - Music
    - Books
    - Projects
    - Games
    - Clutter
  when:
  - global_alter_uuid_set
  - global_alter_mounted

# =============================================================================
# OS Prober (Windows dual-boot detection)
# =============================================================================
- name: Install os-prober
  community.general.pacman:
    name: os-prober
    state: present

- name: Enable os-prober in GRUB config
  ansible.builtin.lineinfile:
    path: /etc/default/grub
    regexp: '^#?GRUB_DISABLE_OS_PROBER='
    line: 'GRUB_DISABLE_OS_PROBER=false'
    state: present
  notify: Regenerate GRUB

# =============================================================================
# Hyprland Monitor Configuration
# =============================================================================
- name: Deploy Hyprland monitor configurations
  when: use_hyprland | default(false)
  block:
    - name: Ensure Hyprland custom config directory exists
      ansible.builtin.file:
        path: "/home/{{ user_name }}/.config/hypr/custom"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'
      become: false

    - name: Deploy Hyprland monitor configuration
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/.config/hypr/custom/monitors.conf"
        dest: "/home/{{ user_name }}/.config/hypr/custom/monitors.conf"
        owner: "{{ user_name }}"
        mode: '0644'
      become: false

    - name: Ensure hyprland.conf sources monitors config
      ansible.builtin.lineinfile:
        path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
        line: "source = ~/.config/hypr/custom/monitors.conf"
        state: present
      become: false

# =============================================================================
# HDR Toggle Scripts
# =============================================================================
- name: Deploy HDR toggle scripts
  when: use_hyprland | default(false)
  block:
    - name: Deploy hdr-on script
      ansible.builtin.copy:
        dest: "/home/{{ user_name }}/.local/bin/hdr-on"
        owner: "{{ user_name }}"
        mode: '0755'
        content: |
          #!/bin/bash
          hyprctl keyword monitor DP-1,3440x1440@239.98,2560x0,1,hdr:1
          echo "HDR enabled on AW3425DW"
      become: false

    - name: Deploy hdr-off script
      ansible.builtin.copy:
        dest: "/home/{{ user_name }}/.local/bin/hdr-off"
        owner: "{{ user_name }}"
        mode: '0755'
        content: |
          #!/bin/bash
          hyprctl keyword monitor DP-1,3440x1440@239.98,2560x0,1
          echo "HDR disabled on AW3425DW"
      become: false
