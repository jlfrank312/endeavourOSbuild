# =============================================================================
# 1. Load snapshot
# =============================================================================
- name: Load II dependency snapshot
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/roles/ii-compat/vars/snapshot.yml"

- name: Abort if snapshot has not been generated
  ansible.builtin.fail:
    msg: >
      roles/ii-compat/vars/snapshot.yml is empty.
      Run 'make snapshot-ii' after verifying II is working on this machine
      to generate the package list before using the ii-compat role.
  when: ii_compat_packages | length == 0

# =============================================================================
# 2. Install packages from snapshot
# =============================================================================
# Attempt to install all snapshot packages via pacman first.
# Packages not found in official repos will be collected in the failed list
# and retried via AUR. This handles the mixed repo/AUR reality of II's
# dependency tree without requiring a manually maintained separation.
- name: Attempt to install snapshot packages via pacman
  ansible.builtin.pacman:
    name: "{{ ii_compat_packages }}"
    state: present
  register: pacman_result
  failed_when: false

- name: Collect packages not found in official repos
  ansible.builtin.set_fact:
    aur_fallback_packages: >-
      {{ pacman_result.stdout | default('')
         | regex_findall("target not found: (\\S+)")
         | list }}

- name: Install AUR fallback packages
  kewlfft.aur.aur:
    name: "{{ aur_fallback_packages }}"
    state: present
  become_user: "{{ user_name }}"
  when: aur_fallback_packages | length > 0

# =============================================================================
# 3. Deploy Hyprland Config
# =============================================================================

## Needs created

# =============================================================================
# 4. Hyprland Environment Setup (Nvidia)
# =============================================================================
- name: Ensure hyprland config directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.config/hypr"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  when: has_nvidia_gpu | default(false)

- name: Deploy NVIDIA Hyprland environment variables
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.config/hypr/nvidia-env.conf"
    owner: "{{ user_name }}"
    mode: '0644'
    content: |
      # NVIDIA Wayland environment variables
      # Managed by Ansible - do not edit manually
      env = LIBVA_DRIVER_NAME,nvidia
      env = XDG_SESSION_TYPE,wayland
      env = GBM_BACKEND,nvidia-drm
      env = __GLX_VENDOR_LIBRARY_NAME,nvidia
      env = NVD_BACKEND,direct
  when: has_nvidia_gpu | default(false)

- name: Ensure hyprland.conf sources NVIDIA env file
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/nvidia-env.conf"
    state: present
  when: has_nvidia_gpu | default(false)
