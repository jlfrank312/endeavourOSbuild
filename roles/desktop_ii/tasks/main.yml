---
# =============================================================================
# 1. Clone / update II repository
# =============================================================================
- name: Clone or update II repository
  ansible.builtin.git:
    repo: https://github.com/end-4/dots-hyprland.git
    dest: "/home/{{ user_name }}/.cache/dots-hyprland"
    depth: 1
    update: true
    force: true
  become: false

# =============================================================================
# 2. Run II installer — let it do everything
# =============================================================================
- name: Check if II has been previously installed
  ansible.builtin.stat:
    path: "/home/{{ user_name }}/.config/illogical-impulse/installed_true"
  register: desktop_ii_firstrun
  become: false

- name: Run II full installer
  ansible.builtin.expect:
    command: bash -c "SKIP_ALLGREETING=1 ./setup install --skip-sysupdate --skip-backup -f"
    chdir: "/home/{{ user_name }}/.cache/dots-hyprland"
    responses:
      '(?i)\[sudo\] password for {{ user_name }}': "{{ ansible_become_password }}"
      '(?i)password': "{{ ansible_become_password }}"
    timeout: 3600
  become: false
  changed_when: true
  when: not desktop_ii_firstrun.stat.exists
  tags: [update-ii]

# =============================================================================
# 3-I. Hyprland Environment Setup (Intel)
# =============================================================================
- name: Deploy Intel Hyprland environment variables
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.config/hypr/custom/intel-env.conf"
    owner: "{{ user_name }}"
    mode: '0644'
    content: |
      # Intel GPU Wayland environment variables
      # Managed by Ansible - do not edit manually
      env = LIBVA_DRIVER_NAME,iHD
  become: false
  when: global_has_intel_gpu | default(false)

- name: Ensure hyprland.conf sources Intel env file
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/intel-env.conf"
    state: present
  become: false
  when: global_has_intel_gpu | default(false)

# =============================================================================
# 3-N. Hyprland Environment Setup (NVidia)
# =============================================================================
- name: Deploy NVIDIA Hyprland environment variables
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.config/hypr/custom/nvidia-env.conf"
    owner: "{{ user_name }}"
    mode: '0644'
    content: |
      # NVIDIA Wayland environment variables
      # Managed by Ansible - do not edit manually
      env = LIBVA_DRIVER_NAME,nvidia
      env = XDG_SESSION_TYPE,wayland
      env = GBM_BACKEND,nvidia-drm
      env = __GLX_VENDOR_LIBRARY_NAME,nvidia
      env = NVD_BACKEND,direct
  become: false
  when: global_has_nvidia_gpu | default(false)

- name: Ensure hyprland.conf sources NVIDIA env file
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/nvidia-env.conf"
    state: present
  become: false
  when: global_has_nvidia_gpu | default(false)

# =============================================================================
# 3-L. Hyprland Environment Setup (Laptop)
# =============================================================================

- name: Deploy laptop input configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/.config/hypr/custom/input.conf"
    dest: "/home/{{ user_name }}/.config/hypr/custom/input.conf"
    owner: "{{ user_name }}"
    mode: '0644'
  become: false
  when:
    - global_is_laptop | default(false)
    - lookup('fileglob', playbook_dir + '/dotfiles/' + ansible_facts['hostname'] + '/.config/hypr/custom/input.conf') | length > 0

- name: Ensure hyprland.conf sources input config
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/input.conf"
    state: present
  become: false
  when: global_is_laptop | default(false)

# =============================================================================
# 3-D. Hyprland Display Configuration (VRR/VFR)
# =============================================================================
- name: Deploy Hyprland display configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/hyprland-display.conf.j2"
    dest: "/home/{{ user_name }}/.config/hypr/custom/display.conf"
    owner: "{{ user_name }}"
    mode: '0644'
  become: false

- name: Ensure hyprland.conf sources display config
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/display.conf"
    state: present
  become: false

# =============================================================================
# 3-W. Wallpaper Deployment
# =============================================================================
- name: Ensure wallpaper directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/Pictures/Wallpapers"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  become: false

- name: Deploy wallpapers
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/dotfiles/wallpapers/{{ ansible_facts['hostname'] }}/"
    dest: "/home/{{ user_name }}/Pictures/Wallpapers/"
    owner: "{{ user_name }}"
    mode: '0644'
  become: false
  when: global_is_laptop | default(false)
  # lookup('fileglob', playbook_dir + '/dotfiles/wallpapers/' + ansible_facts['hostname'] + '/*') | length > 0

# =============================================================================
# 3-X. Deploy Common & Host-Specific Dotfiles (II path)
# Shared task file handles both common and host-specific dotfile deployment.
# user.fish lives at conf.d/user.fish and is auto-sourced by fish.
# The kitty include is handled in the section below (3-K).
# =============================================================================
- name: Check if host-specific dotfiles directory exists (II)
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}"
  register: desktop_ii_host_dotfiles_dir
  delegate_to: localhost
  become: false

- name: Ensure directories exist for common dotfiles (II)
  ansible.builtin.file:
    path: "/home/{{ user_name }}/{{ item.path }}"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  with_community.general.filetree: "{{ playbook_dir }}/dotfiles/common/"
  when: item.state == 'directory'
  become: false

- name: Deploy common static dotfiles (II)
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/home/{{ user_name }}/{{ item.path }}"
    owner: "{{ user_name }}"
    mode: '0644'
  with_community.general.filetree: "{{ playbook_dir }}/dotfiles/common/"
  when:
    - item.state == 'file'
    - not item.path.endswith('.j2')
  become: false

- name: Deploy common templated dotfiles (II)
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/home/{{ user_name }}/{{ item.path | regex_replace('\\.j2$', '') }}"
    owner: "{{ user_name }}"
    mode: '0644'
  with_community.general.filetree: "{{ playbook_dir }}/dotfiles/common/"
  when:
    - item.state == 'file'
    - item.path.endswith('.j2')
  become: false

- block:
    - name: Ensure directories exist for host-specific dotfiles (II)
      ansible.builtin.file:
        path: "/home/{{ user_name }}/{{ item.path }}"
        state: directory
        owner: "{{ user_name }}"
        mode: '0755'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/"
      when: item.state == 'directory'

    - name: Deploy host-specific static dotfiles (II)
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "/home/{{ user_name }}/{{ item.path }}"
        owner: "{{ user_name }}"
        mode: '0644'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/"
      when:
        - item.state == 'file'
        - not item.path.endswith('.j2')

    - name: Deploy host-specific templated dotfiles (II)
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "/home/{{ user_name }}/{{ item.path | regex_replace('\\.j2$', '') }}"
        owner: "{{ user_name }}"
        mode: '0644'
      with_community.general.filetree: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/"
      when:
        - item.state == 'file'
        - item.path.endswith('.j2')
  become: false
  when: desktop_ii_host_dotfiles_dir.stat.exists

# =============================================================================
# 3-K. Kitty Config Integration
# II creates its own kitty.conf. Ensure it sources our user overrides.
# user.fish is in conf.d/ and is auto-sourced by fish — no task needed there.
# =============================================================================
- name: Ensure kitty config includes user.conf (II)
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/kitty/kitty.conf"
    line: "include user.conf"
    state: present
    create: true
    owner: "{{ user_name }}"
    mode: '0644'
  become: false

# =============================================================================
# 3-P. Deploy Display Color Profile
# =============================================================================
- name: Install xiccd for Wayland ICC profile support
  community.general.pacman:
    name:
      - xiccd
      - colord
    state: present

- name: Enable colord service
  ansible.builtin.systemd:
    name: colord
    enabled: true
    state: started

- name: Copy ICC profiles to colord directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/display_profiles/{{ item }}"
    dest: "/usr/share/color/icc/colord/{{ item }}"
    owner: root
    mode: '0644'
  loop:
    - gaming.icc
    - health.icc
    - office.icc
  become: true
  when:
    - global_is_laptop | default(false)
    - lookup('fileglob', playbook_dir + '/dotfiles/' + ansible_facts['hostname'] + '/display_profiles/gaming.icc') | length > 0

- name: Start xiccd and assign gaming profile to display
  ansible.builtin.shell: |
    xiccd &
    sleep 2
    colormgr device-add-profile xrandr-eDP-1 icc-74249ceae37cdad58cc5066c2234be54
    colormgr device-make-profile-default xrandr-eDP-1 icc-74249ceae37cdad58cc5066c2234be54
  become: false
  changed_when: true
  when: global_is_laptop | default(false)

# =============================================================================
# 3-P-F. Firefox Color Management
# =============================================================================
- name: Find Firefox profile directory
  ansible.builtin.find:
    paths: "/home/{{ user_name }}/.config/mozilla/firefox"
    patterns: "*.default-release"
    file_type: directory
  register: desktop_ii_firefox_profile_dir
  become: false

- name: Deploy Firefox user.js
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/.config/firefox/user.js"
    dest: "{{ item.path }}/user.js"
    owner: "{{ user_name }}"
    mode: '0644'
  loop: "{{ desktop_ii_firefox_profile_dir.files | default([]) }}"
  become: false
  when: >
    desktop_ii_firefox_profile_dir.files | default([]) | length > 0 and
    lookup('fileglob', playbook_dir + '/dotfiles/' + ansible_facts['hostname'] + '/.config/firefox/user.js') | length > 0

# =============================================================================
# 4. II-Compat Snapshot
# =============================================================================
- block:
    - name: Snapshot II dependencies for ii_compat fallback
      ansible.builtin.shell: |
        pacman -Qq | grep '^illogical-impulse-' | xargs pacman -Qi \
        | grep "^Depends On" \
        | sed 's/Depends On\s*:\s*//' \
        | tr ' ' '\n' \
        | grep -v '^None$\|^$' \
        | sed 's/[>=<].*//' \
        | sort -u
      register: desktop_ii_snapshot_raw
      changed_when: false
      tags: [snapshot-ii]
      become: false

    - name: Write II dependency snapshot to ii-compat vars
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/roles/ii_compat/vars/snapshot.yml"
        content: |
          # Auto-generated by desktop_ii role after verified II install
          # Do not edit manually — regenerate with: make snapshot-ii
          # Last generated: {{ ansible_date_time.iso8601 }}
          ii_compat_packages:
          {% for pkg in desktop_ii_snapshot_raw.stdout_lines %}
            - {{ pkg }}
          {% endfor %}
      delegate_to: localhost
      tags: [snapshot-ii]
      become: false
  when: "'snapshot-ii' in ansible_run_tags"
