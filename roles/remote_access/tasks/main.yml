---
# =============================================================================
# 0. State Checks
# =============================================================================
- name: Check if SSH public key exists for this host
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/.ssh/id_ed25519.pub"
  register: remote_access_ssh_pubkey_stat
  delegate_to: localhost
  become: false

- name: Set SSH key availability fact
  ansible.builtin.set_fact:
    remote_access_has_ssh_key: "{{ remote_access_ssh_pubkey_stat.stat.exists }}"

# =============================================================================
# 1. FreeRDP
# =============================================================================
- name: Install FreeRDP
  community.general.pacman:
    name: freerdp
    state: present
  when: global_is_laptop | default(false) or global_is_desktop | default(false)

# =============================================================================
# 2. Remote Connection Scripts
# =============================================================================
- name: Ensure ~/.local/bin directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.local/bin"
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'

- name: Ensure FreeRDP config directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.config/freerdp"
    state: directory
    owner: "{{ user_name }}"
    mode: '0700'
  when: global_is_laptop | default(false)

- name: Deploy work PC RDP file
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.config/freerdp/workpc.rdp"
    content: "{{ workpc_rdp }}"
    owner: "{{ user_name }}"
    mode: '0600'
  when: global_is_laptop | default(false) or global_is_desktop | default(false)

- name: Deploy work PC connection script
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.local/bin/workpc"
    owner: "{{ user_name }}"
    mode: '0700'
    content: |
      #!/bin/bash
      USERNAME=$(grep "^username:s:" ~/.config/freerdp/workpc.rdp | cut -d: -f3)
      xfreerdp3 ~/.config/freerdp/workpc.rdp /u:"$USERNAME" /d:""
  when: global_is_laptop | default(false) or global_is_desktop | default(false)

- name: Deploy main PC connection script
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.local/bin/mainpc"
    owner: "{{ user_name }}"
    mode: '0700'
    content: |
      #!/bin/bash
      xfreerdp3 /v:{{ mainpc_smb_host }} /u:{{ mainpc_smb_user }} /d:"" /f
  when: global_is_laptop | default(false)

# =============================================================================
# 3. Main PC SMB Shares
# =============================================================================
- name: Install cifs-utils
  community.general.pacman:
    name: cifs-utils
    state: present
  when: global_is_laptop | default(false)

- name: Ensure samba config directory exists
  ansible.builtin.file:
    path: /etc/samba
    state: directory
    owner: root
    mode: '0755'
  when: global_is_laptop | default(false)

- name: Deploy SMB credentials file for shares from mainpc
  ansible.builtin.copy:
    dest: "/etc/samba/mainpc.creds"
    content: |
      username={{ mainpc_smb_user }}
      password={{ mainpc_smb_password }}
    owner: root
    group: root
    mode: '0600'
  when: global_is_laptop | default(false)

- name: Create mount point directories for shares from mainpc
  ansible.builtin.file:
    path: "/mnt/mainpc/{{ item | lower }}"
    state: directory
    owner: root
    mode: '0755'
  loop: "{{ mainpc_smb_shares }}"
  when: global_is_laptop | default(false)

- name: Deploy systemd mount units for mainpc shares
  ansible.builtin.copy:
    dest: "/etc/systemd/system/mnt-mainpc-{{ item | lower }}.mount"
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Mount Main PC {{ item }} drive
      After=network-online.target
      Wants=network-online.target

      [Mount]
      What=//{{ mainpc_smb_host }}/{{ item }}
      Where=/mnt/mainpc/{{ item | lower }}
      Type=cifs
      Options=credentials=/etc/samba/mainpc.creds,uid={{ user_name }},gid={{ user_name }},iocharset=utf8,vers=3.0

      [Install]
      WantedBy=multi-user.target
  loop: "{{ mainpc_smb_shares }}"
  when: global_is_laptop | default(false)

- name: Deploy systemd automount units for mainpc shares
  ansible.builtin.copy:
    dest: "/etc/systemd/system/mnt-mainpc-{{ item | lower }}.automount"
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Automount Main PC {{ item }} drive
      After=network-online.target

      [Automount]
      Where=/mnt/mainpc/{{ item | lower }}
      TimeoutIdleSec=300

      [Install]
      WantedBy=multi-user.target
  loop: "{{ mainpc_smb_shares }}"
  when: global_is_laptop | default(false)

- name: Enable and start automount units for mainpc shares
  ansible.builtin.systemd:
    name: "mnt-mainpc-{{ item | lower }}.automount"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ mainpc_smb_shares }}"
  when: global_is_laptop | default(false)

# =============================================================================
# 4. Seedbox SSH Key & SSHFS Mount
# =============================================================================
- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "/home/{{ user_name }}/.ssh"
    state: directory
    owner: "{{ user_name }}"
    mode: '0700'
  become: false
  when: remote_access_has_ssh_key

- name: Deploy SSH private key
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.ssh/id_ed25519"
    content: "{{ ssh_private_key }}"
    owner: "{{ user_name }}"
    mode: '0600'
  become: false
  when: remote_access_has_ssh_key

- name: Deploy SSH public key
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.ssh/id_ed25519.pub"
    src: "{{ playbook_dir }}/dotfiles/{{ ansible_facts['hostname'] }}/.ssh/id_ed25519.pub"
    owner: "{{ user_name }}"
    mode: '0644'
  become: false
  when: remote_access_has_ssh_key

- name: Install sshfs
  community.general.pacman:
    name: sshfs
    state: present
  when: remote_access_has_ssh_key

- name: Create seedbox mount point
  ansible.builtin.file:
    path: /mnt/{{ seedbox_name }}
    state: directory
    owner: "{{ user_name }}"
    mode: '0755'
  when: remote_access_has_ssh_key

- name: Deploy seedbox SSH config
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.ssh/config"
    owner: "{{ user_name }}"
    mode: '0600'
    content: |
      Host {{ seedbox_name }}
          HostName {{ seedbox_host }}
          User {{ seedbox_user }}
          IdentityFile ~/.ssh/id_ed25519
  become: false
  when: remote_access_has_ssh_key

- name: Deploy seedbox connection script
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.local/bin/{{ seedbox_name }}"
    owner: "{{ user_name }}"
    mode: '0700'
    content: |
      #!/bin/bash
      ssh {{ seedbox_user }}@{{ seedbox_host }}
  become: false
  when: remote_access_has_ssh_key

- name: Get user UID and GID
  ansible.builtin.getent:
    database: passwd
    key: "{{ user_name }}"
  when: remote_access_has_ssh_key

- name: Deploy systemd mount unit for seedbox
  ansible.builtin.copy:
    dest: /etc/systemd/system/mnt-{{ seedbox_name }}.mount
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Mount Seedbox
      After=network-online.target
      Wants=network-online.target

      [Mount]
      What={{ seedbox_user }}@{{ seedbox_host }}:
      Where=/mnt/{{ seedbox_name }}
      Type=fuse.sshfs
      Options=identityfile=/home/{{ user_name }}/.ssh/id_ed25519,allow_other,default_permissions,uid={{ ansible_facts['getent_passwd'][user_name][1] }},gid={{ ansible_facts['getent_passwd'][user_name][2] }}

      [Install]
      WantedBy=multi-user.target
  when: remote_access_has_ssh_key

- name: Deploy systemd automount unit for seedbox
  ansible.builtin.copy:
    dest: /etc/systemd/system/mnt-{{ seedbox_name }}.automount
    owner: root
    mode: '0644'
    content: |
      [Unit]
      Description=Automount Seedbox
      After=network-online.target

      [Automount]
      Where=/mnt/{{ seedbox_name }}
      TimeoutIdleSec=300

      [Install]
      WantedBy=multi-user.target
  when: remote_access_has_ssh_key

- name: Enable and start seedbox automount
  ansible.builtin.systemd:
    name: mnt-{{ seedbox_name }}.automount
    enabled: true
    state: started
    daemon_reload: true
  when: remote_access_has_ssh_key
