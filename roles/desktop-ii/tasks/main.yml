
# Actuall II install goes above here
- name: Snapshot II dependencies for ii-compat fallback
  ansible.builtin.shell: |
    pacman -Qi \
      illogical-impulse-basic \
      illogical-impulse-audio \
      illogical-impulse-widgets \
      illogical-impulse-hyprland \
      illogical-impulse-fonts-themes \
      illogical-impulse-kde \
      illogical-impulse-portal \
      illogical-impulse-screencapture \
      illogical-impulse-backlight \
      illogical-impulse-toolkit \
      illogical-impulse-python \
    | grep "^Depends On" \
    | sed 's/Depends On\s*:\s*//' \
    | tr ' ' '\n' \
    | grep -v '^None$\|^$' \
    | sed 's/[>=<].*//' \
    | sort -u
  register: ii_snapshot_raw
  changed_when: false
  become: false

- name: Write II dependency snapshot to ii-compat vars
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/roles/ii-compat/vars/snapshot.yml"
    content: |
      # Auto-generated by desktop-ii role after verified II install
      # Do not edit manually — regenerate with: make snapshot-ii
      # Last generated: {{ ansible_date_time.iso8601 }}
      ii_compat_packages:
      {% for pkg in ii_snapshot_raw.stdout_lines %}
        - {{ pkg }}
      {% endfor %}
  delegate_to: localhost
  become: false