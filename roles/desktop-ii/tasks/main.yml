---
# =============================================================================
# 1. Clone / update II repository
# =============================================================================
- name: Clone or update II repository
  ansible.builtin.git:
    repo: https://github.com/end-4/dots-hyprland.git
    dest: "/home/{{ user_name }}/.cache/dots-hyprland"
    depth: 1
    update: yes
    force: yes
  become: false

# =============================================================================
# 2. Run II installer — let it do everything
# =============================================================================
- name: Check if II has been previously installed
  ansible.builtin.stat:
    path: "/home/{{ user_name }}/.config/illogical-impulse/installed_true"
  register: ii_firstrun
  become: false

- name: Grant temporary passwordless sudo for II installer
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ user_name }}
    create: yes
    mode: '0440'
    line: '{{ user_name }} ALL=(ALL) NOPASSWD: ALL'
    validate: 'visudo -cf %s'
  become: true
  when: not ii_firstrun.stat.exists

- name: Run II full installer
  ansible.builtin.shell: |
    echo "{{ ansible_become_password }}" | sudo -S -v 2>/dev/null
    SKIP_ALLGREETING=1 ./setup install --skip-sysupdate --skip-backup -f
  args:
    chdir: "/home/{{ user_name }}/.cache/dots-hyprland"
    executable: /bin/bash
  become: false
  changed_when: true
  when: not ii_firstrun.stat.exists
  tags: [update-ii]
  environment:
    SUDO_ASKPASS: /bin/false

- name: Remove temporary passwordless sudo after II installer
  ansible.builtin.file:
    path: /etc/sudoers.d/{{ user_name }}
    state: absent
  become: true
  when: not ii_firstrun.stat.exists

# =============================================================================
# 3-I. Hyprland Environment Setup (Intel)
# =============================================================================
- name: Deploy Intel Hyprland environment variables
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.config/hypr/custom/intel-env.conf"
    owner: "{{ user_name }}"
    mode: '0644'
    content: |
      # Intel GPU Wayland environment variables
      # Managed by Ansible - do not edit manually
      env = LIBVA_DRIVER_NAME,iHD
  when: has_intel_gpu | default(false)

- name: Ensure hyprland.conf sources Intel env file
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/intel-env.conf"
    state: present
  when: has_intel_gpu | default(false)

# =============================================================================
# 3-N. Hyprland Environment Setup (NVidia)
# =============================================================================
- name: Deploy NVIDIA Hyprland environment variables
  ansible.builtin.copy:
    dest: "/home/{{ user_name }}/.config/hypr/custom/nvidia-env.conf"
    owner: "{{ user_name }}"
    mode: '0644'
    content: |
      # NVIDIA Wayland environment variables
      # Managed by Ansible - do not edit manually
      env = LIBVA_DRIVER_NAME,nvidia
      env = XDG_SESSION_TYPE,wayland
      env = GBM_BACKEND,nvidia-drm
      env = __GLX_VENDOR_LIBRARY_NAME,nvidia
      env = NVD_BACKEND,direct
  when: has_nvidia_gpu | default(false)

- name: Ensure hyprland.conf sources NVIDIA env file
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/nvidia-env.conf"
    state: present
  when: has_nvidia_gpu | default(false)

# =============================================================================
# 3-D. Hyprland Display Configuration (VRR/VFR)
# =============================================================================
- name: Deploy Hyprland display configuration
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/hyprland-display.conf.j2"
    dest: "/home/{{ user_name }}/.config/hypr/custom/display.conf"
    owner: "{{ user_name }}"
    mode: '0644'

- name: Ensure hyprland.conf sources display config
  ansible.builtin.lineinfile:
    path: "/home/{{ user_name }}/.config/hypr/hyprland.conf"
    line: "source = ~/.config/hypr/custom/display.conf"
    state: present

# =============================================================================
# 4. II-Compat Snapshot
# =============================================================================
- name: Snapshot II dependencies for ii-compat fallback
  ansible.builtin.shell: |
    pacman -Qq | grep '^illogical-impulse-' | xargs pacman -Qi \
    | grep "^Depends On" \
    | sed 's/Depends On\s*:\s*//' \
    | tr ' ' '\n' \
    | grep -v '^None$\|^$' \
    | sed 's/[>=<].*//' \
    | sort -u
  register: ii_snapshot_raw
  changed_when: false
  tags: [snapshot-ii]
  when: "'snapshot-ii' in ansible_run_tags"
  become: false

- name: Write II dependency snapshot to ii-compat vars
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/roles/ii-compat/vars/snapshot.yml"
    content: |
      # Auto-generated by desktop-ii role after verified II install
      # Do not edit manually — regenerate with: make snapshot-ii
      # Last generated: {{ ansible_date_time.iso8601 }}
      ii_compat_packages:
      {% for pkg in ii_snapshot_raw.stdout_lines %}
        - {{ pkg }}
      {% endfor %}
  delegate_to: localhost
  tags: [snapshot-ii]
  when: "'snapshot-ii' in ansible_run_tags"
  become: false
